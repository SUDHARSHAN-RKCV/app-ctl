version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passq123
      POSTGRES_DB: posgress
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appctl"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://appctl:appctl@db:5432/appctl
      CHECK_INTERVAL_SECONDS: 30
      DOWN_ALERT_MINUTES: 5

      # ── Auth — CHANGE THESE ───────────────────────────────────
      SECRET_KEY: change-me-in-production-use-a-long-random-string
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme

      # ── Email alerts (optional) ───────────────────────────────
      # SMTP_HOST: smtp.gmail.com
      # SMTP_PORT: 587
      # SMTP_USER: you@gmail.com
      # SMTP_PASSWORD: your-app-password
      # ALERT_TO: you@gmail.com,oncall@company.com
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro
      # Mount SSH keys for remote Linux hosts:
      # - ~/.ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata: